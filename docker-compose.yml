services:

  web:
    build: .
    command: uvicorn app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/uploads
      - outputs:/app/outputs
      - models:/app/models
      - db:/app
      # mount your media folders here for library scanning, e.g.:
      # - /path/to/movies:/media/movies
      # - /path/to/shows:/media/shows
    restart: unless-stopped
    depends_on:
      - worker-1
      - worker-2

  worker-1:
    build: .
    command: python worker.py
    environment:
      - WORKER_ID=worker-1
      - HOSTNAME=worker-1
    volumes:
      - uploads:/app/uploads
      - outputs:/app/outputs
      - models:/app/models
      - db:/app
      # same media mounts as web if using libraries
    restart: unless-stopped

  worker-2:
    build: .
    command: python worker.py
    environment:
      - WORKER_ID=worker-2
      - HOSTNAME=worker-2
    volumes:
      - uploads:/app/uploads
      - outputs:/app/outputs
      - models:/app/models
      - db:/app
    restart: unless-stopped

volumes:
  uploads:
  outputs:
  models:
  db:
